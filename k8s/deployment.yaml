apiVersion: apps/v1
kind: Deployment
metadata:
  name: date-app
  labels:
    app: date-app
spec:
  replicas: 2
  selector:
    matchLabels:
      app: date-app
  template:
    metadata:
      labels:
        app: date-app
    spec:
      containers:
        - name: date-app
          image: date-app:rootless
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 5000
              name: http
          livenessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 5000
            initialDelaySeconds: 5
            periodSeconds: 5
          securityContext:
            runAsNonRoot: true
            runAsUser: 10001
            runAsGroup: 10001
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
            seccompProfile:
              type: RuntimeDefault
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          resources:
            requests:
              cpu: "50m"
              memory: "64Mi"
            limits:
              cpu: "200m"
              memory: "128Mi"
      volumes:
        - name: tmp
          emptyDir: {}