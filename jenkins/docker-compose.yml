services:
  jenkins:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: jenkins
    user: "0:0"
    ports:
      - "8080:8080"
      - "50000:50000"
    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock
      - ${HOME}/.kube/config.jenkins:/var/jenkins_home/.kube/config:ro
      - ${HOME}/.minikube:/var/jenkins_home/.minikube:ro

    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  jenkins_home: